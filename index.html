<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uji Coba Pemindai QR & Ganti Kamera</title>
    <!-- Memuat pustaka dari CDN -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; }
        .controls { margin: 20px 0; }
        select, button { padding: 10px 15px; font-size: 16px; margin: 5px; border-radius: 5px; border: 1px solid #ccc; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #0056b3; }
        #result { margin-top: 20px; font-weight: bold; color: #28a745; padding: 10px; background: #e2f0d9; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Pemindai QR dengan Fitur Ganti Kamera</h1>
    
    <!-- Kontrol Pemilih Kamera -->
    <div class="controls">
        <select id="camera-select">
            <option value="">Memuat kamera...</option>
        </select>
        <button id="toggle-scan-btn">Mulai Scan</button>
    </div>

    <!-- Wadah Kamera -->
    <div id="reader"></div>
    
    <!-- Wadah Hasil -->
    <div id="result">Hasil scan akan muncul di sini.</div>

    <script>
        let html5Qrcode;
        let isScanning = false;
        const cameraSelect = document.getElementById('camera-select');
        const toggleBtn = document.getElementById('toggle-scan-btn');

        // 1. Dapatkan daftar kamera yang tersedia saat halaman dimuat
        Html5Qrcode.getCameras().then(devices => {
            cameraSelect.innerHTML = '';
            if (devices && devices.length) {
                devices.forEach((device, index) => {
                    const option = document.createElement('option');
                    option.value = device.id;
                    // Tampilkan label kamera atau fallback ke nomor kamera
                    option.text = device.label || `Kamera ${index + 1}`;
                    cameraSelect.appendChild(option);
                });
            } else {
                cameraSelect.innerHTML = '<option value="">Kamera tidak ditemukan</option>';
            }
        }).catch(err => {
            console.error("Gagal mendapatkan kamera:", err);
            cameraSelect.innerHTML = '<option value="">Izin kamera ditolak</option>';
        });

        // 2. Fungsi untuk mulai memindai
        function startScanning(cameraId) {
            html5Qrcode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5Qrcode.start(
                cameraId, 
                config,
                (decodedText) => {
                    // Berhasil scan
                    document.getElementById('result').innerText = `Teks Terdeteksi: ${decodedText}`;
                },
                (errorMessage) => {
                    // Gagal deteksi (diabaikan agar konsol bersih)
                }
            ).then(() => {
                isScanning = true;
                toggleBtn.innerText = "Hentikan Scan";
                toggleBtn.style.backgroundColor = "#dc3545"; // Merah
            }).catch(err => {
                console.error("Gagal menjalankan kamera:", err);
            });
        }

        // 3. Fungsi untuk menghentikan pemindai
        function stopScanning() {
            if (html5Qrcode) {
                html5Qrcode.stop().then(() => {
                    isScanning = false;
                    toggleBtn.innerText = "Mulai Scan";
                    toggleBtn.style.backgroundColor = "#007bff"; // Biru
                }).catch(err => {
                    console.error("Gagal menghentikan kamera:", err);
                });
            }
        }

        // 4. Event Listener untuk Tombol Mulai/Berhenti
        toggleBtn.addEventListener('click', () => {
            if (isScanning) {
                stopScanning();
            } else {
                const selectedCameraId = cameraSelect.value;
                if (selectedCameraId) {
                    startScanning(selectedCameraId);
                } else {
                    alert("Silakan pilih kamera terlebih dahulu.");
                }
            }
        });

        // 5. Event Listener saat pengguna mengubah pilihan kamera secara aktif
        cameraSelect.addEventListener('change', () => {
            if (isScanning) {
                // Hentikan kamera yang aktif terlebih dahulu, lalu jalankan kamera baru
                html5Qrcode.stop().then(() => {
                    startScanning(cameraSelect.value);
                });
            }
        });
    </script>
</body>
</html>
