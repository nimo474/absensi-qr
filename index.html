<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pemindai QR - Fitur Ganti Kamera</title>
    <!-- Memuat pustaka dari CDN -->
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; }
        #reader { width: 100%; max-width: 500px; margin: 0 auto; background: #000; border-radius: 8px; overflow: hidden; }
        .controls { margin: 20px 0; }
        button { padding: 12px 20px; font-size: 16px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; border: none; }
        #start-btn { background-color: #007bff; color: white; }
        #switch-btn { background-color: #6c757d; color: white; display: none; } /* Tersembunyi di awal */
        #result { margin-top: 20px; font-weight: bold; color: #28a745; padding: 10px; background: #e2f0d9; display: inline-block; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Pemindai QR Kode</h1>
    
    <!-- Kontrol Tombol -->
    <div class="controls">
        <button id="start-btn">Mulai Pindai</button>
        <button id="switch-btn">Ganti Kamera 🔄</button>
    </div>

    <!-- Wadah Kamera -->
    <div id="reader"></div>
    
    <!-- Wadah Hasil -->
    <div id="result">Hasil scan akan muncul di sini.</div>

    <script>
        let html5Qrcode;
        let isScanning = false;
        // "environment" artinya kamera belakang, "user" artinya kamera depan
        let currentFacingMode = "environment"; 

        const startBtn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');

        // Fungsi untuk menjalankan kamera berdasarkan Mode (Depan/Belakang)
        function startScanning(facingMode) {
            if (!html5Qrcode) {
                html5Qrcode = new Html5Qrcode("reader");
            }

            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5Qrcode.start(
                { facingMode: facingMode }, // Menggunakan mode arah kamera, bukan ID perangkat
                config,
                (decodedText) => {
                    document.getElementById('result').innerText = `Teks Terdeteksi: ${decodedText}`;
                },
                (errorMessage) => {
                    // Log error pemindaian biasa diabaikan agar performa lancar
                }
            ).then(() => {
                isScanning = true;
                startBtn.innerText = "Hentikan Pindai";
                startBtn.style.backgroundColor = "#dc3545"; // Berubah merah saat aktif
                switchBtn.style.display = "inline-block"; // Tampilkan tombol ganti kamera
            }).catch(err => {
                console.error("Gagal mengakses kamera:", err);
                alert("Gagal mengakses kamera. Pastikan izin kamera sudah diberikan di browser Anda.");
            });
        }

        // Fungsi untuk menghentikan kamera
        function stopScanning() {
            if (html5Qrcode && isScanning) {
                html5Qrcode.stop().then(() => {
                    isScanning = false;
                    startBtn.innerText = "Mulai Pindai";
                    startBtn.style.backgroundColor = "#007bff"; // Kembali biru
                    switchBtn.style.display = "none"; // Sembunyikan tombol ganti
                }).catch(err => console.error("Gagal menghentikan kamera:", err));
            }
        }

        // Event Klik Tombol Utama (Mulai/Berhenti)
        startBtn.addEventListener('click', () => {
            if (isScanning) {
                stopScanning();
            } else {
                startScanning(currentFacingMode);
            }
        });

        // Event Klik Tombol Ganti Kamera
        switchBtn.addEventListener('click', () => {
            if (isScanning) {
                // Balikkan mode kamera
                currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";
                
                // Hentikan kamera saat ini lalu jalankan ulang dengan mode baru
                html5Qrcode.stop().then(() => {
                    startScanning(currentFacingMode);
                }).catch(err => console.error(err));
            }
        });
    </script>
</body>
</html>
