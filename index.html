<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Redmi Note 10 Pro - Stabil</title>
    
    <!-- Menggunakan Pustaka Resmi Versi Ringan -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f9; margin: 0; }
        h1 { font-size: 20px; color: #333; margin-bottom: 5px; }
        p { font-size: 14px; color: #666; margin-top: 0; }
        
        #reader { width: 100%; max-width: 420px; margin: 0 auto; background: #000; border-radius: 12px; overflow: hidden; min-height: 280px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        
        .controls { margin: 20px 0; }
        button { padding: 15px 25px; font-size: 15px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; touch-action: manipulation; }
        #start-btn { background-color: #007bff; color: white; }
        #switch-btn { background-color: #28a745; color: white; }
        
        #result { margin-top: 20px; font-weight: bold; color: #212529; padding: 15px; background: #e9ecef; display: inline-block; border-radius: 6px; width: 100%; max-width: 400px; box-sizing: border-box; word-break: break-all; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <h1>Pemindai QR Code</h1>
    <p>Dioptimalkan untuk Perangkat Multi-Lensa Android</p>
    
    <div class="controls">
        <button id="start-btn">Nyalakan Kamera</button>
        <button id="switch-btn">Ganti Kamera 🔄</button>
    </div>

    <div id="reader"></div>
    <div id="result">Hasil scan akan muncul di sini.</div>

    <script>
        let html5QrCode;
        let isScanning = false;
        // Gunakan string objek langsung untuk fleksibilitas API Android Chrome
        let currentFacingMode = "environment"; 

        const startBtn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');

        function jalankanKamera(mode) {
            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }
            
            // KONFIGURASI PALING LONGGAR: Tanpa aspek rasio atau batasan ukuran frame video
            // Ini mencegah crash "OverconstrainedError" pada sensor 108MP Xiaomi
            const config = { 
                fps: 10
            };

            // Memanggil subsistem kamera dengan toleransi error tinggi
            html5QrCode.start(
                { facingMode: mode }, 
                config,
                (decodedText) => {
                    document.getElementById('result').style.background = "#d4edda";
                    document.getElementById('result').style.color = "#155724";
                    document.getElementById('result').innerText = `Sukses: ${decodedText}`;
                },
                (errorMessage) => { /* abaikan error pencarian frame */ }
            ).then(() => {
                isScanning = true;
                startBtn.innerText = "Matikan Kamera";
                startBtn.style.backgroundColor = "#dc3545";
            }).catch(err => {
                console.error("Gagal start:", err);
                
                // JIKA CHROMIUM ERROR, BERIKAN TIPS IZIN SITUS SECARA MANUAL
                document.getElementById('result').style.background = "#f8d7da";
                document.getElementById('result').style.color = "#721c24";
                document.getElementById('result').innerHTML = `
                    <b>Kamera diblokir browser.</b><br>
                    1. Klik ikon gembok 🔒 di sebelah kiri bilah alamat URL Chrome Anda.<br>
                    2. Aktifkan/Izinkan menu <b>Kamera</b>.<br>
                    3. Muat ulang (refresh) halaman ini.
                `;
            });
        }

        // Aksi Tombol Mulai/Matikan
        startBtn.addEventListener('click', function() {
            if (isScanning) {
                html5QrCode.stop().then(() => {
                    isScanning = false;
                    startBtn.innerText = "Nyalakan Kamera";
                    startBtn.style.backgroundColor = "#007bff";
                    document.getElementById('result').innerText = "Kamera dimatikan.";
                    document.getElementById('result').style.background = "#e9ecef";
                    document.getElementById('result').style.color = "#212529";
                }).catch(err => console.error("Gagal stop:", err));
            } else {
                jalankanKamera(currentFacingMode);
            }
        });

        // Aksi Tombol Ganti Kamera
        switchBtn.addEventListener('click', function() {
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";

            if (isScanning) {
                // Proses stop dan start diberikan jeda aman (safe timeout) agar OS MIUI tidak macet
                html5QrCode.stop().then(() => {
                    setTimeout(() => {
                        jalankanKamera(currentFacingMode);
                    }, 300); 
                }).catch(err => {
                    jalankanKamera(currentFacingMode);
                });
            } else {
                const targetKamera = (currentFacingMode === "environment") ? "Belakang" : "Depan";
                document.getElementById('result').innerText = `Kamera dialihkan ke: Kamera ${targetKamera}. Silakan ketuk 'Nyalakan Kamera'.`;
            }
        });
    </script>
</body>
</html>
