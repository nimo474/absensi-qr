<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Redmi Note 10 Pro</title>
    <script src="https://unpkg.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f9; }
        #reader { width: 100%; max-width: 450px; margin: 0 auto; background: #000; border-radius: 12px; overflow: hidden; }
        .controls { margin: 20px 0; }
        button { padding: 14px 24px; font-size: 16px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; border: none; }
        #start-btn { background-color: #007bff; color: white; }
        #switch-btn { background-color: #28a745; color: white; }
        #result { margin-top: 20px; font-weight: bold; color: #212529; padding: 12px; background: #e9ecef; display: inline-block; border-radius: 5px; width: 100%; max-width: 430px; box-sizing: border-box; word-break: break-all; }
    </style>
</head>
<body>

    <h1>Pemindai QR Code</h1>
    
    <div class="controls">
        <button id="start-btn">Nyalakan Kamera</button>
        <!-- Tombol ini sekarang SELALU AKTIF sejak awal halaman dimuat -->
        <button id="switch-btn">Ganti Kamera 🔄</button>
    </div>

    <div id="reader"></div>
    <div id="result">Hasil scan akan muncul di sini.</div>

    <script>
        let html5Qrcode = new Html5Qrcode("reader");
        let isScanning = false;
        
        // Mode kamera default: "environment" = Kamera Belakang, "user" = Kamera Depan
        let currentFacingMode = "environment"; 

        const startBtn = document.getElementById('start-btn');
        const switchBtn = document.getElementById('switch-btn');

        // Fungsi menyalakan kamera dengan konfigurasi paling fleksibel (Mencegah OverconstrainedError)
        function jalankanKamera(mode) {
            // Konfigurasi dasar tanpa memaksakan ukuran box atau aspek rasio yang kaku
            const config = { 
                fps: 10
            };

            html5Qrcode.start(
                { facingMode: mode }, // Memanggil kategori arah kamera, bukan ID hardware spesifik
                config,
                (decodedText) => {
                    document.getElementById('result').innerText = `Sukses: ${decodedText}`;
                },
                (errorMessage) => { /* abaikan error pencarian frame */ }
            ).then(() => {
                isScanning = true;
                startBtn.innerText = "Matikan Kamera";
                startBtn.style.backgroundColor = "#dc3545";
            }).catch(err => {
                console.error("Gagal start kamera:", err);
                alert("Kamera gagal dimuat. Pastikan izin kamera di browser Chrome Anda sudah diaktifkan.");
            });
        }

        // Event listener untuk tombol Nyalakan/Matikan
        startBtn.addEventListener('click', () => {
            if (isScanning) {
                html5Qrcode.stop().then(() => {
                    isScanning = false;
                    startBtn.innerText = "Nyalakan Kamera";
                    startBtn.style.backgroundColor = "#007bff";
                }).catch(err => console.error(err));
            } else {
                jalankanKamera(currentFacingMode);
            }
        });

        // Event listener untuk tombol Ganti Kamera (Metode Tukar Mode Langsung)
        switchBtn.addEventListener('click', () => {
            // Tukar orientasi kamera secara langsung
            currentFacingMode = (currentFacingMode === "environment") ? "user" : "environment";

            if (isScanning) {
                // Jika kamera sedang menyala, hentikan dulu lalu nyalakan mode yang baru
                html5Qrcode.stop().then(() => {
                    jalankanKamera(currentFacingMode);
                }).catch(err => {
                    // Jika transisi gagal, langsung paksakan restart ke mode baru
                    console.log("Transisi tertunda, mencoba paksa...", err);
                    jalankanKamera(currentFacingMode);
                });
            } else {
                // Jika kamera mati, beri tahu mode apa yang akan aktif saat dinyalakan nanti
                const namaKamera = (currentFacingMode === "environment") ? "Belakang" : "Depan";
                alert(`Kamera disiapkan ke: Kamera ${namaKamera}. Klik 'Nyalakan Kamera' untuk memulai.`);
            }
        });
    </script>
</body>
</html>
