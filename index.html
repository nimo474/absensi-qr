<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Scanner Redmi Note 10 Pro - Sukses</title>
    
    <!-- Memuat Pustaka Resmi Terstabil -->
    <script src="https://cloudflare.com"></script>
    
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f4f6f9; margin: 0; }
        h1 { font-size: 20px; color: #333; margin-bottom: 5px; }
        p { font-size: 13px; color: #666; margin-top: 0; padding: 0 10px; }
        
        .box-scanner { width: 100%; max-width: 420px; margin: 20px auto; background: white; padding: 20px; border-radius: 12px; box-sizing: border-box; border: 1px dashed #007bff; }
        
        .file-upload-btn { display: inline-block; padding: 16px 30px; font-size: 16px; font-weight: bold; background-color: #007bff; color: white; border-radius: 8px; cursor: pointer; border: none; touch-action: manipulation; box-shadow: 0 4px 6px rgba(0,123,255,0.2); width: 100%; box-sizing: border-box; }
        .file-upload-btn:active { background-color: #0056b3; }
        #qr-input-file { display: none; }
        
        /* Wadah Tersembunyi untuk Alokasi Memori Mesin Pengurai */
        #reader { width: 100%; max-width: 400px; margin: 0 auto; display: none; }
        
        #result { margin-top: 20px; font-weight: bold; color: #212529; padding: 15px; background: #e9ecef; display: inline-block; border-radius: 6px; width: 100%; max-width: 400px; box-sizing: border-box; word-break: break-all; border: 1px solid #ccc; text-align: left; }
    </style>
</head>
<body>

    <h1>Pemindai QR Code Xiaomi</h1>
    <p>Akurasi Tinggi dengan Pengurai Berkas Tunggal Berhasil</p>
    
    <div class="box-scanner">
        <label for="qr-input-file" class="file-upload-btn">📷 Ambil Foto Kode QR</label>
        <input type="file" id="qr-input-file" accept="image/*" capture="environment">
    </div>

    <!-- Wadah internal wajib library -->
    <div id="reader"></div>

    <div id="result">Hasil pemindaian akan muncul di sini.</div>

    <script>
        const html5QrCode = new Html5Qrcode("reader"); 
        const fileInput = document.getElementById('qr-input-file');
        const resultDiv = document.getElementById('result');

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length === 0) return;

            // KOREKSI UTAMA: Mengambil indeks ke-0 ([0]) untuk mengirimkan objek satu File tunggal
            const rawFile = e.target.files[0]; 
            
            resultDiv.style.background = "#fff3cd";
            resultDiv.style.color = "#856404";
            resultDiv.innerHTML = "⏳ Sedang memproses dan mengompresi gambar...";

            // PROSES BYPASS RESOLUSI: Menggunakan FileReader dan Canvas untuk memperkecil ukuran foto megapiksel tinggi
            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Kompresi ukuran gambar ke standar deteksi optimal pustaka (800 piksel)
                    const max_size = 800;
                    let width = img.width;
                    let height = img.height;
                    
                    if (width > height) {
                        if (width > max_size) { height *= max_size / width; width = max_size; }
                    } else {
                        if (height > max_size) { width *= max_size / height; height = max_size; }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Mengubah Canvas kembali menjadi objek File tunggal biner yang siap diurai
                    canvas.toBlob(function(blob) {
                        const compressedFile = new File([blob], rawFile.name, {
                            type: rawFile.type,
                            lastModified: Date.now()
                        });
                        
                        // Kirim berkas hasil kompresi yang ringan ke mesin pemindai html5-qrcode
                        html5QrCode.scanFile(compressedFile, false)
                            .then(decodedText => {
                                resultDiv.style.background = "#d4edda";
                                resultDiv.style.color = "#155724";
                                resultDiv.style.borderColor = "#c3e6cb";
                                resultDiv.innerHTML = `<b>🎉 Sukses Terdeteksi!</b><br><br><span style="font-weight:normal; color:#333;">${decodedText}</span>`;
                            })
                            .catch(err => {
                                resultDiv.style.background = "#f8d7da";
                                resultDiv.style.color = "#721c24";
                                resultDiv.style.borderColor = "#f5c6cb";
                                resultDiv.innerHTML = `
                                    <b>Gagal Membaca Gambar ❌</b><br><br>
                                    Pola QR tidak ditemukan atau gambar terlalu blur.<br><br>
                                    <span style="font-size:12px; font-weight:normal; color:#555; display:block;">
                                    <b>Tips Sukses:</b> Dekatkan kamera ke kode QR (jarak ±15cm), tunggu lensa melakukan fokus otomatis, lalu ambil foto kembali.
                                    </span>
                                `;
                                console.error(err);
                            });
                    }, rawFile.type);
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(rawFile);
        });
    </script>
</body>
</html>
