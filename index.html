<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Absensi QR - Redmi Note 10 Pro</title>

    <!-- FIX: sebelumnya <script src="https://cloudflare.com"> (bukan library, jadi Html5Qrcode selalu undefined) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, Roboto, sans-serif;
            text-align: center;
            padding: 16px;
            background: #f4f6f9;
            margin: 0;
        }
        h1 { font-size: 20px; color: #222; margin-bottom: 4px; }
        p.subtitle { font-size: 13px; color: #666; margin-top: 0; padding: 0 10px; }

        .box-scanner {
            width: 100%;
            max-width: 420px;
            margin: 16px auto;
            background: white;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid #dde3ea;
        }

        /* Wadah live camera */
        #reader {
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
        }

        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 12px;
            flex-wrap: wrap;
        }
        button {
            padding: 12px 20px;
            font-size: 15px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            touch-action: manipulation;
        }
        #btn-start { background: #007bff; color: white; }
        #btn-start:active { background: #0056b3; }
        #btn-stop { background: #6c757d; color: white; display: none; }
        #btn-stop:active { background: #545b62; }
        #btn-scan-again { background: #28a745; color: white; display: none; }
        #btn-scan-again:active { background: #1e7e34; }

        #status {
            margin-top: 10px;
            font-size: 13px;
            color: #856404;
            min-height: 18px;
        }

        #result {
            margin-top: 16px;
            font-weight: bold;
            color: #212529;
            padding: 15px;
            background: #e9ecef;
            display: none;
            border-radius: 6px;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            word-break: break-word;
            border: 1px solid #ccc;
            text-align: left;
            margin-left: auto;
            margin-right: auto;
        }
        #result .field { margin: 4px 0; font-size: 15px; }
        #result .field span.label { color: #555; font-weight: normal; font-size: 12px; display: block; }
        #result .raw {
            margin-top: 8px;
            font-size: 11px;
            font-weight: normal;
            color: #888;
            border-top: 1px dashed #ccc;
            padding-top: 6px;
        }
        #result .save-status {
            margin-top: 8px;
            font-size: 13px;
            font-weight: normal;
            padding-top: 8px;
            border-top: 1px dashed #ccc;
        }
    </style>
</head>
<body>

    <h1>📋 Absensi QR Anggota</h1>
    <p class="subtitle">Arahkan kamera ke kode QR anggota (Nama &amp; NIK)</p>

    <div class="box-scanner">
        <div id="reader"></div>

        <div class="controls">
            <button id="btn-start">📷 Mulai Pindai</button>
            <button id="btn-stop">⏹ Hentikan</button>
            <button id="btn-scan-again">🔄 Pindai Lagi</button>
        </div>

        <div id="status"></div>
    </div>

    <div id="result">Hasil pemindaian akan muncul di sini.</div>

    <script>
        // ==== KONFIGURASI ====
        // Tempel URL Web App hasil deploy Apps Script Anda di sini
        // (bentuknya: https://script.google.com/macros/s/XXXXXXXXXXXX/exec)
        // const WEBAPP_URL = "GANTI_DENGAN_URL_WEB_APP_ANDA";
		const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyWwxz75vfhRuWas_6z7RmApuTJoWFp5M5OijN6WVVeu4JoOA_mSi6sY7zyhJJctGAw/exec";
        // ======================

        const READER_ID = "reader";
        let html5QrCode = null;
        let isScanning = false;

        const btnStart = document.getElementById('btn-start');
        const btnStop = document.getElementById('btn-stop');
        const btnScanAgain = document.getElementById('btn-scan-again');
        const statusEl = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        // Pastikan library berhasil dimuat sebelum dipakai
        window.addEventListener('load', () => {
            if (typeof Html5Qrcode === 'undefined') {
                statusEl.style.color = '#721c24';
                statusEl.innerText = '⚠️ Gagal memuat pustaka pemindai QR. Periksa koneksi internet.';
                btnStart.disabled = true;
                return;
            }
            html5QrCode = new Html5Qrcode(READER_ID);
        });

        // Coba mengurai isi QR menjadi field Nama & NIK.
        // Format utama yang dipakai: "Nama NIK" dipisah spasi (contoh: "Budi Santoso 3201012345678901")
        // Token TERAKHIR yang berupa angka dianggap NIK, sisanya (bisa mengandung spasi) dianggap Nama.
        // Tetap mendukung JSON dan delimiter lain sebagai cadangan.
        function parseQrPayload(text) {
            const trimmed = text.trim();

            // 1. Format utama: "Nama ... NIK" dipisah spasi, NIK = deretan angka di akhir teks
            const spaceMatch = trimmed.match(/^(.+?)\s+(\d{6,})$/);
            if (spaceMatch) {
                return { nama: spaceMatch[1].trim(), nik: spaceMatch[2].trim(), raw: trimmed };
            }

            // 2. Coba sebagai JSON
            try {
                const obj = JSON.parse(trimmed);
                const nama = obj.nama || obj.Nama || obj.name || obj.Name || null;
                const nik = obj.nik || obj.NIK || obj.no_nik || obj.noNik || null;
                if (nama || nik) {
                    return { nama, nik, raw: trimmed };
                }
            } catch (e) { /* bukan JSON, lanjut ke pola berikutnya */ }

            // 3. Coba pola "Nama: X, NIK: Y" (label eksplisit, urutan bebas)
            const namaMatch = trimmed.match(/nama\s*[:=]\s*([^;,|\n]+)/i);
            const nikMatch = trimmed.match(/nik\s*[:=]\s*([0-9A-Za-z]+)/i);
            if (namaMatch || nikMatch) {
                return {
                    nama: namaMatch ? namaMatch[1].trim() : null,
                    nik: nikMatch ? nikMatch[1].trim() : null,
                    raw: trimmed
                };
            }

            // 4. Coba pola dipisah delimiter umum: "Nama;NIK" atau "Nama|NIK" atau baris baru
            const parts = trimmed.split(/[;|\n]/).map(p => p.trim()).filter(Boolean);
            if (parts.length >= 2) {
                return { nama: parts[0], nik: parts[1], raw: trimmed };
            }

            // 5. Tidak dikenali formatnya -> tampilkan mentah saja
            return { nama: null, nik: null, raw: trimmed };
        }

        function showResult(decodedText) {
            const data = parseQrPayload(decodedText);
            resultDiv.style.display = 'block';
            resultDiv.style.background = "#d4edda";
            resultDiv.style.color = "#155724";
            resultDiv.style.borderColor = "#c3e6cb";

            let html = `<div style="font-size:16px;">🎉 Absensi Terdeteksi</div>`;
            if (data.nama) {
                html += `<div class="field"><span class="label">Nama</span>${escapeHtml(data.nama)}</div>`;
            }
            if (data.nik) {
                html += `<div class="field"><span class="label">NIK</span>${escapeHtml(data.nik)}</div>`;
            }
            if (!data.nama && !data.nik) {
                html += `<div class="field"><span class="label">Isi QR (format tidak dikenali)</span>${escapeHtml(data.raw)}</div>`;
            } else {
                html += `<div class="raw">Data mentah: ${escapeHtml(data.raw)}</div>`;
            }
            html += `<div class="save-status" id="save-status">💾 Menyimpan ke spreadsheet...</div>`;
            resultDiv.innerHTML = html;

            return data;
        }

        function updateSaveStatus(text, color) {
            const el = document.getElementById('save-status');
            if (el) {
                el.innerText = text;
                el.style.color = color || '#555';
            }
        }

        function sendToSheet(data) {
            if (!WEBAPP_URL || WEBAPP_URL.indexOf('GANTI_DENGAN') !== -1) {
                updateSaveStatus('⚠️ URL Apps Script belum diisi di kode index.html.', '#856404');
                return;
            }
            if (!data.nama && !data.nik) {
                updateSaveStatus('⚠️ Tidak disimpan: format QR tidak dikenali (Nama/NIK kosong).', '#856404');
                return;
            }

            const payload = {
                nama: data.nama || '',
                nik: data.nik || '',
                status: 'Hadir'
            };

            // Content-Type text/plain dipakai agar tidak memicu CORS preflight,
            // yang tidak didukung dengan baik oleh Web App Apps Script.
            fetch(WEBAPP_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(json => {
                if (json.result === 'success') {
                    updateSaveStatus('✅ Tersimpan ke spreadsheet (' + json.timestamp + ')', '#155724');
                } else {
                    updateSaveStatus('❌ Gagal menyimpan: ' + (json.message || 'error tidak diketahui'), '#721c24');
                }
            })
            .catch(err => {
                updateSaveStatus('❌ Gagal menghubungi spreadsheet: ' + err, '#721c24');
            });
        }

        function escapeHtml(str) {
            const d = document.createElement('div');
            d.innerText = str;
            return d.innerHTML;
        }

        function onScanSuccess(decodedText) {
            // Getarkan HP sebagai isyarat berhasil (jika didukung)
            if (navigator.vibrate) navigator.vibrate(150);

            const data = showResult(decodedText);
            sendToSheet(data);
            stopScanning();
            btnScanAgain.style.display = 'inline-block';
            statusEl.innerText = '';
        }

        function startScanning() {
            if (!html5QrCode || isScanning) return;

            resultDiv.style.display = 'none';
            btnScanAgain.style.display = 'none';
            statusEl.style.color = '#856404';
            statusEl.innerText = '⏳ Membuka kamera...';

            // qrbox membatasi area yang dipindai -> kamera tidak "menjepret semuanya",
            // hanya mencari pola QR di dalam kotak pemandu tersebut, secara real-time.
            const config = {
                fps: 10,
                qrbox: { width: 250, height: 250 },
                aspectRatio: 1.0
            };

            // Kamera browser hanya boleh diakses lewat HTTPS (atau localhost saat dites di komputer)
            if (!window.isSecureContext) {
                statusEl.style.color = '#721c24';
                statusEl.innerText = '❌ Halaman ini harus dibuka lewat HTTPS (mis. link GitHub Pages), bukan file lokal, agar kamera bisa diakses.';
                return;
            }

            html5QrCode.start(
                { facingMode: "environment" }, // kamera belakang, sesuai HP Xiaomi Redmi Note 10 Pro
                config,
                onScanSuccess,
                (errorMessage) => { /* frame tanpa QR, diabaikan supaya tidak spam log */ }
            ).then(() => {
                isScanning = true;
                btnStart.style.display = 'none';
                btnStop.style.display = 'inline-block';
                statusEl.innerText = 'Arahkan kamera ke kode QR di dalam kotak.';
            }).catch(err => {
                statusEl.style.color = '#721c24';
                const name = (err && err.name) ? err.name : '';
                if (name === 'NotAllowedError' || /Permission denied/i.test(String(err))) {
                    statusEl.innerHTML = '❌ Izin kamera ditolak.<br>Buka ikon 🔒 di address bar browser → Permissions → Camera → Allow, lalu muat ulang halaman ini.';
                } else if (name === 'NotFoundError') {
                    statusEl.innerText = '❌ Kamera tidak ditemukan di perangkat ini.';
                } else if (name === 'NotReadableError') {
                    statusEl.innerText = '❌ Kamera sedang dipakai aplikasi lain. Tutup aplikasi kamera/video lain lalu coba lagi.';
                } else {
                    statusEl.innerText = '❌ Tidak bisa mengakses kamera: ' + err;
                }
            });
        }

        function stopScanning() {
            if (!html5QrCode || !isScanning) return;
            html5QrCode.stop().then(() => {
                html5QrCode.clear();
                isScanning = false;
                btnStart.style.display = 'inline-block';
                btnStop.style.display = 'none';
            }).catch(() => {
                isScanning = false;
                btnStart.style.display = 'inline-block';
                btnStop.style.display = 'none';
            });
        }

        btnStart.addEventListener('click', startScanning);
        btnStop.addEventListener('click', () => {
            stopScanning();
            statusEl.innerText = '';
        });
        btnScanAgain.addEventListener('click', startScanning);
    </script>
</body>
</html>
