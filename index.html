<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner Absensi QR</title>
  <script src="https://jsdelivr.net"></script>
  <script src="https://unpkg.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

  <div class="bg-white p-6 rounded-2xl shadow-xl w-full max-w-md text-center">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Scanner Absensi</h1>
    <p class="text-sm text-gray-500 mb-6">Gunakan tombol di bawah untuk memindai kartu anggota</p>
    
    <!-- Tombol Utama untuk Akses Kamera HP Konvensional -->
    <label class="block w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-6 rounded-xl cursor-pointer shadow-md transition-all text-lg mb-6">
      📸 Ambil Foto / Scan QR
      <input type="file" id="qr-input-file" accept="image/*" capture="environment" class="hidden">
    </label>

    <!-- Kontrak Penampung Proses (Hidden) -->
    <div id="reader" class="hidden"></div>
    
    <!-- Status Hasil Input -->
    <div id="status" class="mt-4 p-4 rounded-xl text-sm font-semibold bg-gray-50 text-gray-600">
      Siap melakukan pemindaian...
    </div>
  </div>

  <script>
    // ⚠️ PASTIKAN LINK WEB APP GOOGLE APPS SCRIPT ANDA TETAP TERPASANG DI SINI
    // const WEB_APP_URL = "https://google.com"; 
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyzmH-vYjYIRW396f0pnXeFiDEs6pnOwsGj4viHvRGM1ZZdsBGBFqMthRUMbrAUwYVd/exec";
    
    const html5QrCode = new Html5Qrcode("reader");
    const fileInput = document.getElementById('qr-input-file');
    const statusDiv = document.getElementById('status');

    fileInput.addEventListener('change', e => {
      if (e.target.files.length == 0) return;
      
      const imageFile = e.target.files[0];
      statusDiv.className = "mt-4 p-4 rounded-xl text-sm font-semibold bg-blue-100 text-blue-700 animate-pulse";
      statusDiv.innerText = "Membaca QR Code dan memproses data...";

      // Membaca file gambar yang diambil dari kamera HP
      html5QrCode.scanFile(imageFile, true)
      .then(decodedText => {
        kirimKeGoogleSheets(decodedText);
      })
      .catch(err => {
        statusDiv.className = "mt-4 p-4 rounded-xl text-sm font-semibold bg-red-100 text-red-700";
        statusDiv.innerText = "Gagal membaca QR Code. Pastikan posisi gambar tegak, fokus, dan jelas!";
      });
    });

    function kirimKeGoogleSheets(qrData) {
      statusDiv.innerText = "Mengirim data ke Google Sheets...";
      
      fetch(WEB_APP_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ qrData: qrData })
      })
      .then(() => {
        statusDiv.className = "mt-4 p-4 rounded-xl text-sm font-semibold bg-green-100 text-green-700";
        statusDiv.innerText = "Absensi berhasil dicatat ke database secara realtime!";
        
        setTimeout(() => {
          statusDiv.className = "mt-4 p-4 rounded-xl text-sm font-semibold bg-gray-50 text-gray-600";
          statusDiv.innerText = "Siap untuk memindai kartu berikutnya...";
        }, 4000);
      })
      .catch(error => {
        statusDiv.className = "mt-4 p-4 rounded-xl text-sm font-semibold bg-red-100 text-red-700";
        statusDiv.innerText = "Gagal kirim data ke server: " + error.message;
      });
    }
  </script>
</body>
</html>
